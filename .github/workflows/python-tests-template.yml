---
# yamllint disable rule:line-length
name: python-tests-template
'on':
  workflow_call:
    inputs:
      working-directory:
        description: "Set the working directory"
        required: false
        default: "."
        type: string
    secrets:
      ssl_server_key:
        description: "SSL Server key"
        required: false
      ssl_server_crt:
        description: "SSL Server certicate"
        required: false
      ssl_ca_crt:
        description: "SSL certificate"
        required: false
defaults:
  run:
    shell: bash -xeuo pipefail {0}
permissions:
  contents: read
jobs:
  python-tests-template:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Install uv
        working-directory: ${{ inputs.working-directory }}
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Install venv and dependencies
        working-directory: ${{ inputs.working-directory }}
        run: |
          if [[ -s Makefile ]]; then
            make install
          elif [[ -s uv.lock ]]; then
            uv sync
          else
            python -m venv .venv
            . ./.venv/bin/activate
            pip install -r requirements.txt
          fi
      - name: Recreate certificates
        working-directory: ${{ inputs.working-directory }}
        env:
          SERVER_KEY: ${{ secrets.SSL_SERVER_KEY }}
          SERVER_CRT: ${{ secrets.SSL_SERVER_CRT }}
          CA_CRT: ${{ secrets.SSL_CA_CRT }}
        run: |
          if [[ -n "${SERVER_KEY}" ]]; then
            mkdir certificates
            echo "${SERVER_KEY}" | base64 --decode > certificates/server.key
            echo "${SERVER_CRT}" | base64 --decode > certificates/server.crt
            echo "${CA_CRT}" | base64 --decode > certificates/ca.crt
          fi
      - name: Run tests
        working-directory: ${{ inputs.working-directory }}
        run: |
          if [[ -s Makefile ]]; then
            make test
          elif [[ -s uv.lock ]]; then
            uv run pytest
          else
            . ./.venv/bin/activate
            pytest
          fi
